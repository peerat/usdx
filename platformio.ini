[platformio]
src_dir = .

# Baseline build for the current ATmega328P/Uno target.
[env:uno]
platform = atmelavr
board = uno
framework = arduino

# Hardware-profile smoke tests. The baseline env:uno keeps the in-source
# default (`USDX_HW_RED_CORNERS`), while these envs exercise alternate presets.
[env:uno_hw_black_brick]
extends = env:uno
build_flags = -DUSDX_HW_BLACK_BRICK

[env:uno_hw_red_buttons]
extends = env:uno
build_flags = -DUSDX_HW_RED_BUTTONS

[env:uno_hw_trusdx]
extends = env:uno
build_flags = -DUSDX_HW_TRUSDX

[env:uno_hw_generic_27mhz]
extends = env:uno
build_flags = -DUSDX_HW_GENERIC_27MHZ

# Structural smoke tests for alternate TX/input bridge selections.
[env:uno_tx_ntx]
extends = env:uno
build_flags = -DUSDX_TX_NTX

[env:uno_input_onebutton]
extends = env:uno
build_flags =
  -DUSDX_INPUT_ONEBUTTON
  -DUSDX_INPUT_ONEBUTTON_INV

# UI/display smoke tests. They exercise the new UI bridge layer without
# changing the baseline in-source display selection.
[env:uno_ui_lcd_i2c]
extends = env:uno
build_flags = -DUSDX_UI_LCD_I2C

[env:uno_ui_oled_ssd1306]
extends = env:uno
build_flags = -DUSDX_UI_OLED_SSD1306

[env:uno_ui_oled_sh1106]
extends = env:uno
build_flags = -DUSDX_UI_OLED_SH1106

[env:uno_ui_oled_sh1106_condensed]
extends = env:uno
build_flags =
  -DUSDX_UI_OLED_SH1106
  -DUSDX_UI_CONDENSED

# Practical size-first profiles. Unlike uno_no_* measurement envs, these are
# intended as usable starting points when we need real flash headroom.
[env:uno_size_headroom]
extends = env:uno
build_flags = -DUSDX_DISABLE_CW_DECODER

[env:uno_size_tight]
extends = env:uno
build_flags =
  -DUSDX_DISABLE_CW_DECODER
  -DUSDX_DISABLE_SWR_METER

[env:uno_size_digital]
extends = env:uno
build_flags =
  -DUSDX_DISABLE_CW_DECODER
  -DUSDX_DISABLE_KEYER
  -DUSDX_DISABLE_CW_VOLUME

[env:uno_oled_ssd1306_cat_slim]
extends = env:uno
build_flags =
  -DUSDX_UI_OLED_SSD1306
  -DUSDX_DISABLE_CW_DECODER

[env:uno_oled_sh1106_cat_slim]
extends = env:uno
build_flags =
  -DUSDX_UI_OLED_SH1106
  -DUSDX_DISABLE_CW_DECODER

[env:uno_oled_ssd1306_cat_tight]
extends = env:uno
build_flags =
  -DUSDX_UI_OLED_SSD1306
  -DUSDX_DISABLE_CW_DECODER
  -DUSDX_DISABLE_SWR_METER

[env:uno_oled_sh1106_cat_tight]
extends = env:uno
build_flags =
  -DUSDX_UI_OLED_SH1106
  -DUSDX_DISABLE_CW_DECODER
  -DUSDX_DISABLE_SWR_METER

# Size-profiling builds. Each profile disables one feature so its flash/RAM
# cost can be compared with env:uno in the PlatformIO size report.
[env:uno_no_swr]
extends = env:uno
build_flags = -DUSDX_DISABLE_SWR_METER

[env:uno_no_lpf]
extends = env:uno
build_flags = -DUSDX_DISABLE_LPF_SWITCHING

[env:uno_no_cw_decoder]
extends = env:uno
build_flags = -DUSDX_DISABLE_CW_DECODER

[env:uno_no_vox]
extends = env:uno
build_flags = -DUSDX_DISABLE_VOX

[env:uno_no_semi_qsk]
extends = env:uno
build_flags = -DUSDX_DISABLE_SEMI_QSK

[env:uno_no_rit]
extends = env:uno
build_flags = -DUSDX_DISABLE_RIT

[env:uno_no_tx_delay]
extends = env:uno
build_flags = -DUSDX_DISABLE_TX_DELAY

[env:uno_no_clock]
extends = env:uno
build_flags = -DUSDX_DISABLE_CLOCK

[env:uno_no_quad]
extends = env:uno
build_flags = -DUSDX_DISABLE_QUAD

[env:uno_no_cw_message]
extends = env:uno
build_flags = -DUSDX_DISABLE_CW_MESSAGE

[env:uno_no_cw_volume]
extends = env:uno
build_flags = -DUSDX_DISABLE_CW_VOLUME

[env:uno_no_fast_agc]
extends = env:uno
build_flags = -DUSDX_DISABLE_FAST_AGC

[env:uno_no_keep_band_data]
extends = env:uno
build_flags = -DUSDX_DISABLE_KEEP_BAND_DATA

[env:uno_no_cw_intermediate]
extends = env:uno
build_flags = -DUSDX_DISABLE_CW_INTERMEDIATE

[env:uno_no_filter_700hz]
extends = env:uno
build_flags = -DUSDX_DISABLE_FILTER_700HZ

[env:uno_no_cat_xo]
extends = env:uno
build_flags = -DUSDX_DISABLE_CAT_XO_CMD

[env:uno_no_keyer]
extends = env:uno
build_flags = -DUSDX_DISABLE_KEYER

[env:uno_no_cat]
extends = env:uno
build_flags = -DUSDX_DISABLE_CAT
